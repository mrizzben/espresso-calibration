<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espresso Calibration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  font-family: 'Fira Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #0D0806 0%, #1A0F0A 50%, #0D0806 100%);
  color: #F5F0EB;
  padding: 16px;
  max-width: 640px;
  margin: 0 auto;
  line-height: 1.5;
  min-height: 100vh;
}

h1 {
  font-family: 'Fira Code', monospace;
  font-size: 1.5rem;
  color: #FBBF24;
  margin-bottom: 2px;
}

.subtitle {
  color: #C8A882;
  font-size: .85rem;
  margin-bottom: 1.5rem;
}

section {
  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
}

h2 {
  font-family: 'Fira Code', monospace;
  font-size: 1.1rem;
  margin-bottom: 12px;
  color: #FBBF24;
}

label {
  display: block;
  font-size: .85rem;
  color: #C8A882;
  margin-bottom: 4px;
  font-weight: 500;
}

input[type=number],input[type=text] {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.08);
  color: #F5F0EB;
  font-size: 1rem;
  margin-bottom: 12px;
  outline: 0;
  transition: border-color 200ms, box-shadow 200ms;
  font-family: 'Fira Sans', sans-serif;
}

input:focus {
  border-color: #FBBF24;
  box-shadow: 0 0 0 3px rgba(251,191,36,0.15);
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.ratio-wrap {
  margin-bottom: 12px;
}

.ratio-display {
  text-align: center;
  font-size: .9rem;
  padding: 10px;
  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border-radius: 10px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: #C8A882;
}

.ratio-display span {
  color: #FBBF24;
  font-weight: 700;
  font-family: 'Fira Code', monospace;
}

.btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-size: 1rem;
  cursor: pointer;
  margin-bottom: 6px;
  font-family: 'Fira Sans', sans-serif;
  font-weight: 500;
  transition: all 200ms;
}

.btn-primary {
  background: #FBBF24;
  color: #0D0806;
}

.btn-primary:hover {
  background: #FCD34D;
}

.btn-predict {
  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid #FBBF24;
  color: #FBBF24;
}

.btn-predict:hover {
  background: rgba(251, 191, 36, 0.15);
}

.table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: .85rem;
}

th {
  text-align: left;
  padding: 8px 6px;
  border-bottom: 1px solid rgba(251, 191, 36, 0.3);
  color: #FBBF24;
  font-family: 'Fira Code', monospace;
  font-size: .75rem;
  text-transform: uppercase;
  letter-spacing: .05em;
  white-space: nowrap;
}

td {
  padding: 8px 6px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  white-space: nowrap;
}

tbody tr:hover td {
  background: rgba(255, 255, 255, 0.04);
}

.delete-btn {
  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: #C8A882;
  cursor: pointer;
  font-size: .8rem;
  padding: 2px 8px;
  border-radius: 6px;
  transition: all 200ms;
}

.delete-btn:hover {
  border-color: #FBBF24;
  color: #FBBF24;
  background: rgba(251, 191, 36, 0.15);
}

.prediction-box {
  margin-top: 12px;
  padding: 14px;
  background: #FBBF24;
  border-radius: 10px;
  text-align: center;
  font-size: .95rem;
  color: #0D0806;
}

.prediction-box .value {
  color: #78350F;
  font-weight: 700;
  font-family: 'Fira Code', monospace;
  font-size: 1.1rem;
}

.prediction-box .note {
  color: #78350F;
  font-size: .8rem;
  margin-top: 4px;
}

.empty {
  text-align: center;
  color: #C8A882;
  padding: 24px;
  font-size: .9rem;
  font-style: italic;
}

.clear-wrap {
  text-align: right;
  margin-top: 12px;
}

.btn-clear {
  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: #C8A882;
  padding: 6px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: .8rem;
  font-family: 'Fira Sans', sans-serif;
  transition: all 200ms;
}

.btn-clear:hover {
  border-color: #FBBF24;
  color: #FBBF24;
}
</style>
</head>
<body>

<h1>Espresso Calibration</h1>
<p class="subtitle">La Marzocco GS3 MP + Mahlkönig EK43</p>

<section>
  <h2>Log Shot</h2>
  <div class="form-row">
    <div>
      <label for="grind">Grind Setting</label>
      <input type="number" id="grind" step="0.1" value="1.5">
    </div>
    <div>
      <label for="dose">Dose g</label>
      <input type="number" id="dose" step="0.1" value="18">
    </div>
  </div>
  <div class="form-row">
    <div>
      <label for="yield">Yield g</label>
      <input type="number" id="yield" step="0.1" value="36">
    </div>
    <div>
      <label for="time">Time s</label>
      <input type="number" id="time" step="0.1" value="30">
    </div>
  </div>
  <div class="form-row">
    <div>
      <label for="machine">Machine</label>
      <input type="text" id="machine" value="La Marzocco GS3 MP">
    </div>
    <div>
      <label for="grinder">Grinder</label>
      <input type="text" id="grinder" value="Mahlkönig EK43">
    </div>
  </div>
  <label for="notes">Notes</label>
  <input type="text" id="notes" placeholder="e.g. dark roast, 2 weeks old, humid day">
  <div class="ratio-wrap">
    <div class="ratio-display">Ratio: <span id="ratio">2.00</span></div>
  </div>
  <button class="btn btn-primary" id="logBtn">Log Shot</button>
</section>

<section>
  <h2>Predict Grind</h2>
  <label for="targetTime">Target Time (s)</label>
  <input type="number" id="targetTime" step="0.1" value="30">
  <button class="btn btn-predict" id="predictBtn">Predict Grind Setting</button>
  <div id="prediction"></div>
</section>

<section>
  <h2>Shot Log</h2>
  <div class="table-wrap" id="tableWrap"></div>
  <div class="clear-wrap"><button class="btn-clear" id="clearBtn">Clear All Data</button></div>
</section>

<script>
// ponytail: no framework, no build step — one HTML file is the minimum
// ponytail: uses local API server (server.py) + sqlite3, no cloud dependency
// ponytail: simple linear regression, not polynomial — sufficient for small espresso tuning range
// ponytail: single numeric grind setting — user maps to their grinder's scale

let shots = [];

async function load() {
  try {
    const res = await fetch('/api/shots');
    if (res.ok) { shots = await res.json(); return; }
  } catch {}
  shots = [];
}

function renderTable() {
  const wrap = document.getElementById('tableWrap');
  if (shots.length === 0) {
    wrap.innerHTML = '<div class="empty">No shots logged yet.</div>';
    return;
  }
  const rows = shots.map(s => {
    const d = new Date(s.created_at);
    const ds = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    const ratio = (s.yield / s.dose).toFixed(2);
    return `<tr>
      <td>${ds}</td>
      <td>${s.machine || 'La Marzocco GS3 MP'} + ${s.grinder || 'Mahlkönig EK43'}</td>
      <td>${s.grind}</td>
      <td>${s.dose}</td>
      <td>${s.yield}</td>
      <td>${ratio}</td>
      <td>${s.time}</td>
      <td>${s.notes || '—'}</td>
      <td><button class="delete-btn" data-id="${s.id}">✕</button></td>
    </tr>`;
  }).join('');
  wrap.innerHTML = `<table><thead><tr>
    <th>Date</th><th>Setup</th><th>Grind</th><th>Dose</th><th>Yield</th><th>Ratio</th><th>Time</th><th>Notes</th><th></th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

async function logShot() {
  const grind = parseFloat(document.getElementById('grind').value);
  const dose = parseFloat(document.getElementById('dose').value);
  const yieldW = parseFloat(document.getElementById('yield').value);
  const time = parseFloat(document.getElementById('time').value);
  const machineVal = document.getElementById('machine').value;
  const grinderVal = document.getElementById('grinder').value;

  const notesVal = document.getElementById('notes').value;

  if ([grind, dose, yieldW, time].some(isNaN) || dose <= 0) return;

  const res = await fetch('/api/shots', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ grind, dose, yield: yieldW, time, machine: machineVal, grinder: grinderVal, notes: notesVal })
  });
  if (res.ok) {
    await load();
    renderTable();
  }
}

async function deleteShot(id) {
  await fetch(`/api/shots/${id}`, { method: 'DELETE' });
  await load();
  renderTable();
  clearPrediction();
}

async function clearAll() {
  if (!confirm('Delete all logged shots?')) return;
  await fetch('/api/shots', { method: 'DELETE' });
  await load();
  renderTable();
  clearPrediction();
}

function computeRatio() {
  const dose = parseFloat(document.getElementById('dose').value) || 1;
  const yieldW = parseFloat(document.getElementById('yield').value) || 0;
  document.getElementById('ratio').textContent = (yieldW / dose).toFixed(2);
}

function predictGrind() {
  const target = parseFloat(document.getElementById('targetTime').value);
  const currentMachine = document.getElementById('machine').value;
  const currentGrinder = document.getElementById('grinder').value;
  const el = document.getElementById('prediction');

  if (isNaN(target) || target <= 0) {
    el.innerHTML = '<div class="prediction-box">Enter a valid target time.</div>';
    return;
  }

  const filteredShots = shots.filter(s =>
    (s.machine || 'La Marzocco GS3 MP') === currentMachine &&
    (s.grinder || 'Mahlkönig EK43') === currentGrinder
  );

  if (filteredShots.length < 2) {
    el.innerHTML = '<div class="prediction-box">Need at least 2 shots logged for this setup.</div>';
    return;
  }

  const n = filteredShots.length;
  let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;

  for (const s of filteredShots) {
    sumX += s.grind;
    sumY += s.time;
    sumXY += s.grind * s.time;
    sumX2 += s.grind * s.grind;
  }

  const denom = n * sumX2 - sumX * sumX;
  if (Math.abs(denom) < 1e-10) {
    el.innerHTML = '<div class="prediction-box">Cannot predict — all shots at same grind setting. Try a different grind.</div>';
    return;
  }

  const slope = (n * sumXY - sumX * sumY) / denom;
  const intercept = (sumY - slope * sumX) / n;
  const predicted = (target - intercept) / slope;

  el.innerHTML = `<div class="prediction-box">
    Suggested grind: <span class="value">${predicted.toFixed(2)}</span>
    <div class="note">Based on ${n} logged shots</div>
  </div>`;
}

function clearPrediction() {
  document.getElementById('prediction').innerHTML = '';
}


document.getElementById('dose').addEventListener('input', computeRatio);
document.getElementById('yield').addEventListener('input', computeRatio);
document.getElementById('logBtn').addEventListener('click', logShot);
document.getElementById('predictBtn').addEventListener('click', predictGrind);
document.getElementById('clearBtn').addEventListener('click', clearAll);
document.getElementById('tableWrap').addEventListener('click', e => {
  const btn = e.target.closest('.delete-btn');
  if (btn) deleteShot(btn.dataset.id);
});

(async () => {
  await load();
  renderTable();
  computeRatio();
})();
</script>
</body>
</html>
